name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lua-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Release gate
        run: scripts/release_gate.sh
